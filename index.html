<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Blast Pro - Drag & Drop</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --cell-size: 45px;
        }

        body {
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Mobil üçün sürüşməni bağlayır */
        }

        /* Sol Sıralama Paneli */
        #leaderboard-panel {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        /* Mərkəzi Oyun Sahəsi */
        #main-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        canvas {
            touch-action: none;
            cursor: grab;
        }

        canvas:active { cursor: grabbing; }

        #blocks-tray {
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 15px;
        }

        /* Ad soruşma ekranı */
        #nameModal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid var(--accent);
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 100%;
            margin: 15px 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .stats-top {
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--accent);
        }
    </style>
</head>
<body>

<div id="nameModal">
    <div class="modal-box">
        <h2>XOŞ GƏLDİNİZ</h2>
        <p>Sıralama üçün adınızı daxil edin:</p>
        <input type="text" id="nameInput" placeholder="Oyunçu adı...">
        <button onclick="startGame()">OYUNA BAŞLA</button>
    </div>
</div>

<div id="leaderboard-panel">
    <h3 style="margin-top: 0; color: var(--accent);">🏆 TOP 10</h3>
    <div id="rankList"></div>
</div>

<div id="main-game">
    <div class="stats-top">Kupa: <span id="trophyDisplay">0</span></div>
    <canvas id="gameGrid" width="360" height="360"></canvas>
    <div id="blocks-tray">
        <canvas id="block0" width="90" height="90"></canvas>
        <canvas id="block1" width="90" height="90"></canvas>
        <canvas id="block2" width="90" height="90"></canvas>
    </div>
</div>

<script>
    const GRID_SIZE = 8;
    const CELL = 45;
    let grid = Array(8).fill().map(() => Array(8).fill(0));
    let shapes = [null, null, null];
    let draggingIdx = -1;
    let playerName = "";
    let trophies = 0;

    // Blok Fiqurları
    const SHAPES = [
        [[1,1],[1,1]], // Kvadrat
        [[1,1,1,1]],   // Uzun xətt
        [[1,1,1],[0,1,0]], // T formalı
        [[1,1,0],[0,1,1]], // Z formalı
        [[1,1,1]], // Kiçik xətt
        [[1,1],[1,0]] // Künc
    ];

    const gridCanvas = document.getElementById('gameGrid');
    const gCtx = gridCanvas.getContext('2d');
    
    // Maus və toxunuş koordinatları
    let mouseX = 0, mouseY = 0;
    let isDragging = false;

    function startGame() {
        const input = document.getElementById('nameInput').value;
        if(input.length < 2) return;
        playerName = input;
        document.getElementById('nameModal').style.display = 'none';
        generateShapes();
        updateLeaderboard();
        draw();
    }

    function generateShapes() {
        for(let i=0; i<3; i++) {
            shapes[i] = SHAPES[Math.floor(Math.random()*SHAPES.length)];
        }
    }

    function draw() {
        gCtx.clearRect(0,0,360,360);
        
        // Arxa plan toru (Grid)
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                gCtx.fillStyle = grid[r][c] ? "#38bdf8" : "rgba(255,255,255,0.05)";
                gCtx.fillRect(c*CELL + 2, r*CELL + 2, CELL-4, CELL-4);
            }
        }

        // Ghost Preview (İz)
        if(isDragging && draggingIdx !== -1) {
            const rect = gridCanvas.getBoundingClientRect();
            let c = Math.floor((mouseX - rect.left) / CELL);
            let r = Math.floor((mouseY - rect.top) / CELL);
            
            if(canPlace(r, c, shapes[draggingIdx])) {
                gCtx.fillStyle = "rgba(56, 189, 248, 0.3)";
                shapes[draggingIdx].forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) gCtx.fillRect((c+ci)*CELL + 2, (r+ri)*CELL + 2, CELL-4, CELL-4);
                    });
                });
            }
        }

        // Aşağıdakı seçimləri çək
        for(let i=0; i<3; i++) {
            const bc = document.getElementById('block' + i);
            const bCtx = bc.getContext('2d');
            bCtx.clearRect(0,0,90,90);
            if(shapes[i] && draggingIdx !== i) {
                bCtx.fillStyle = "#fbbf24";
                shapes[i].forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) bCtx.fillRect(ci*18 + 15, ri*18 + 15, 16, 16);
                    });
                });
            }
        }
        
        // Əgər sürüklənirsə, mausun yanında bloku çək
        if(isDragging && draggingIdx !== -1) {
            const shape = shapes[draggingIdx];
            gCtx.fillStyle = "#fbbf24";
            shape.forEach((row, ri) => {
                row.forEach((v, ci) => {
                    if(v) gCtx.fillRect(mouseX - gridCanvas.getBoundingClientRect().left + ci*CELL - CELL/2, 
                                       mouseY - gridCanvas.getBoundingClientRect().top + ri*CELL - CELL/2, 
                                       CELL-4, CELL-4);
                });
            });
        }

        requestAnimationFrame(draw);
    }

    // Drag Məntiqi
    window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mouseup', handleEnd);

    window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', e => { 
        mouseX = e.touches[0].clientX; 
        mouseY = e.touches[0].clientY; 
    });
    window.addEventListener('touchend', handleEnd);

    function handleStart(x, y) {
        for(let i=0; i<3; i++) {
            const rect = document.getElementById('block' + i).getBoundingClientRect();
            if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                if(shapes[i]) {
                    draggingIdx = i;
                    isDragging = true;
                }
            }
        }
    }

    function handleEnd() {
        if(!isDragging) return;
        const rect = gridCanvas.getBoundingClientRect();
        let c = Math.floor((mouseX - rect.left) / CELL);
        let r = Math.floor((mouseY - rect.top) / CELL);

        if(canPlace(r, c, shapes[draggingIdx])) {
            placeShape(r, c, shapes[draggingIdx]);
            shapes[draggingIdx] = null;
            checkLines();
            addTrophy();
            if(shapes.every(s => s === null)) generateShapes();
        }

        isDragging = false;
        draggingIdx = -1;
    }

    function canPlace(r, c, shape) {
        if(!shape) return false;
        for(let i=0; i<shape.length; i++) {
            for(let j=0; j<shape[i].length; j++) {
                if(shape[i][j]) {
                    if(r+i < 0 || r+i >= 8 || c+j < 0 || c+j >= 8 || grid[r+i][c+j]) return false;
                }
            }
        }
        return true;
    }

    function placeShape(r, c, shape) {
        shape.forEach((row, ri) => {
            row.forEach((v, ci) => {
                if(v) grid[r+ri][c+ci] = 1;
            });
        });
    }

    function checkLines() {
        let linesCleared = 0;
        // Sətir yoxla
        for(let r=0; r<8; r++) {
            if(grid[r].every(v => v === 1)) {
                grid[r] = Array(8).fill(0);
                linesCleared++;
            }
        }
        // Sütun yoxla
        for(let c=0; c<8; c++) {
            let full = true;
            for(let r=0; r<8; r++) if(!grid[r][c]) full = false;
            if(full) {
                for(let r=0; r<8; r++) grid[r][c] = 0;
                linesCleared++;
            }
        }
    }

    function addTrophy() {
        trophies += Math.floor(Math.random() * 20) + 10;
        document.getElementById('trophyDisplay').innerText = trophies;
        localStorage.setItem('score_' + playerName, trophies);
        updateLeaderboard();
    }

    function updateLeaderboard() {
        let players = [];
        for(let i=0; i<localStorage.length; i++) {
            let k = localStorage.key(i);
            if(k.startsWith('score_')) {
                players.push({name: k.replace('score_', ''), score: parseInt(localStorage.getItem(k))});
            }
        }
        players.sort((a,b) => b.score - a.score);
        document.getElementById('rankList').innerHTML = players.slice(0, 10).map((p, i) => `
            <div class="rank-item">
                <span>${i+1}. ${p.name}</span>
                <b color="#38bdf8">${p.score}</b>
            </div>
        `).join('');
    }
</script>

</body>
</html>
