<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Pro - GitHub Edition</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --accent: #38bdf8;
            --card-bg: rgba(30, 41, 59, 0.8);
            --block-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            touch-action: none;
        }

        /* Ad Soruşma Paneli */
        #nameModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            border: 2px solid var(--accent);
            text-align: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }

        /* Oyun Sahəsi */
        #game-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--card-bg);
            padding: 10px 30px;
            border-radius: 50px;
        }

        #grid-canvas {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 4px solid #334155;
        }

        /* Aşağıdakı 3 Blok Paneli */
        #blocks-tray {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            height: 120px;
            align-items: center;
        }

        .shape-option {
            background: var(--card-bg);
            border: 2px solid var(--block-border);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .shape-option:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .selected {
            border-color: #4ade80 !important;
            transform: translateY(-5px);
        }

        #leaderboard {
            margin-top: 30px;
            width: 320px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div id="nameModal">
        <div class="modal-content">
            <h2 style="color: var(--accent); margin: 0;">XOŞ GƏLDİN!</h2>
            <p>Sıralamada görünmək üçün adını yaz:</p>
            <input type="text" id="userNameInput" placeholder="Məsələn: Kral_01">
            <button onclick="initPlayer()">OYUNA BAŞLA</button>
        </div>
    </div>

    <div id="game-container">
        <div class="stats">
            <span>👤 <span id="pName">...</span></span>
            <span>🏆 <span id="pTrophies">0</span></span>
        </div>

        <canvas id="grid-canvas" width="320" height="320"></canvas>

        <div id="blocks-tray">
            <canvas id="opt1" class="shape-option" width="80" height="80" onclick="selectShape(0)"></canvas>
            <canvas id="opt2" class="shape-option" width="80" height="80" onclick="selectShape(1)"></canvas>
            <canvas id="opt3" class="shape-option" width="80" height="80" onclick="selectShape(2)"></canvas>
        </div>

        <div id="leaderboard">
            <h3 style="text-align:center; margin-top:0;">📊 TOP 5 SIRALAMA</h3>
            <div id="rankList"></div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const CELL = 40;
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let shapes = [null, null, null];
        let selectedIndex = -1;
        let pData = { name: "", trophies: 0 };

        const SHAPES_DATA = [
            [[1, 1], [1, 1]], // Kvadrat
            [[1, 1, 1]],      // Yatay xətt
            [[1], [1], [1]],  // Şaquli xətt
            [[1, 0], [1, 1]], // L formalı
            [[1]]             // Tək blok
        ];

        function initPlayer() {
            let name = document.getElementById('userNameInput').value.trim();
            if(name.length < 2) return alert("Ad çox qısadır!");
            
            pData.name = name;
            localStorage.setItem('bb_name', name);
            pData.trophies = parseInt(localStorage.getItem('bb_trophies_' + name)) || 0;
            
            document.getElementById('nameModal').style.display = 'none';
            document.getElementById('pName').innerText = name;
            document.getElementById('pTrophies').innerText = pData.trophies;
            
            generateNewShapes();
            drawAll();
            updateLeaderboard();
        }

        function generateNewShapes() {
            for(let i=0; i<3; i++) {
                shapes[i] = SHAPES_DATA[Math.floor(Math.random() * SHAPES_DATA.length)];
            }
        }

        function drawAll() {
            const canvas = document.getElementById('grid-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,320,320);

            // Lövhəni çək
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    ctx.strokeStyle = "#334155";
                    ctx.strokeRect(c*CELL, r*CELL, CELL, CELL);
                    if(grid[r][c]) {
                        ctx.fillStyle = "#38bdf8";
                        ctx.fillRect(c*CELL+2, r*CELL+2, CELL-4, CELL-4);
                    }
                }
            }

            // Variantları çək
            for(let i=0; i<3; i++) {
                const optCanvas = document.getElementById('opt' + (i+1));
                const oCtx = optCanvas.getContext('2d');
                oCtx.clearRect(0,0,80,80);
                if(!shapes[i]) continue;

                oCtx.fillStyle = "#fbbf24";
                shapes[i].forEach((row, rIdx) => {
                    row.forEach((cell, cIdx) => {
                        if(cell) oCtx.fillRect(cIdx*15+15, rIdx*15+15, 13, 13);
                    });
                });
            }
        }

        function selectShape(idx) {
            if(!shapes[idx]) return;
            selectedIndex = idx;
            document.querySelectorAll('.shape-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('opt' + (idx+1)).classList.add('selected');
        }

        document.getElementById('grid-canvas').addEventListener('click', function(e) {
            if(selectedIndex === -1) return;

            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const col = Math.floor(x / CELL);
            const row = Math.floor(y / CELL);

            if(canPlace(row, col, shapes[selectedIndex])) {
                placeShape(row, col, shapes[selectedIndex]);
                shapes[selectedIndex] = null;
                selectedIndex = -1;
                document.querySelectorAll('.shape-option').forEach(el => el.classList.remove('selected'));
                
                checkLines();
                
                if(shapes.every(s => s === null)) generateNewShapes();
                
                pData.trophies += Math.floor(Math.random() * 10) + 5;
                localStorage.setItem('bb_trophies_' + pData.name, pData.trophies);
                document.getElementById('pTrophies').innerText = pData.trophies;
                
                drawAll();
                updateLeaderboard();
            }
        });

        function canPlace(row, col, shape) {
            for(let r=0; r<shape.length; r++) {
                for(let c=0; c<shape[r].length; c++) {
                    if(shape[r][c]) {
                        if(row+r >= 8 || col+c >= 8 || grid[row+r][col+c]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(row, col, shape) {
            for(let r=0; r<shape.length; r++) {
                for(let c=0; c<shape[r].length; c++) {
                    if(shape[r][c]) grid[row+r][col+c] = 1;
                }
            }
        }

        function checkLines() {
            // Sadələşdirilmiş sətir silmə (Blok partlaması)
            for(let r=0; r<8; r++) {
                if(grid[r].every(cell => cell === 1)) grid[r] = Array(8).fill(0);
            }
        }

        function updateLeaderboard() {
            // Bu hissə eyni cihazdakı adları simulyasiya edir
            let scores = [];
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('bb_trophies_')) {
                    scores.push({
                        name: key.replace('bb_trophies_', ''),
                        score: parseInt(localStorage.getItem(key))
                    });
                }
            }
            scores.sort((a,b) => b.score - a.score);
            
            const list = document.getElementById('rankList');
            list.innerHTML = scores.slice(0, 5).map((s, i) => `
                <div class="rank-item">
                    <span>${i+1}. ${s.name}</span>
                    <b>${s.score} 🏆</b>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
