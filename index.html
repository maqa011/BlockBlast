<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Blast Pro - Final Edition</title>
    <style>
        :root {
            --bg-main: #3b4a8b;
            --grid-bg: #2d396d;
            --panel-bg: rgba(23, 32, 70, 0.95);
            --accent-yellow: #ffcc00;
            --white: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            background: var(--bg-main);
            color: var(--white);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Sol Sıralama */
        #leaderboard {
            position: absolute;
            left: 20px;
            width: 240px;
            height: 80vh;
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lb-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Oyun Mərkəzi */
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #score-view {
            font-size: 70px;
            font-weight: 900;
            margin: 0;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        #tray {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        /* Effektlər */
        #combo-msg {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 5rem;
            color: var(--accent-yellow);
            text-shadow: 0 0 30px #ffcc00;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active-msg { transform: translate(-50%, -50%) scale(1.1) !important; opacity: 1 !important; }

        /* Uduzmaq Səhifəsi */
        #game-over {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        /* Giriş Paneli */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-box {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 30px;
            border: 4px solid var(--accent-yellow);
            text-align: center;
        }

        .btn {
            background: var(--accent-yellow);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 200px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Ulduz animasiyası üçün canvas */
        #fx-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 90;
        }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>
<div id="combo-msg">MÖHTƏŞƏM!</div>

<div id="auth-screen">
    <div class="modal-box">
        <h2>XOŞ GƏLDİN!</h2>
        <p>Adını bir dəfə daxil et:</p>
        <input type="text" id="userName" placeholder="Adın...">
        <br>
        <button class="btn" onclick="saveUser()">BAŞLA</button>
    </div>
</div>

<div id="game-over">
    <h1 style="font-size: 4rem; color: var(--danger);">OYUN BİTDİ!</h1>
    <p style="font-size: 1.5rem;">Sənin Xalın: <span id="finalScore">0</span></p>
    <button class="btn" onclick="restartGame()">TƏKRAR BAŞLA</button>
</div>

<div id="leaderboard">
    <h3 style="text-align: center; color: var(--accent-yellow);">🏆 REKORDLAR</h3>
    <div id="rankRows"></div>
</div>

<div id="game-container">
    <div id="score-view">0</div>
    <canvas id="main-canvas" width="400" height="400"></canvas>
    <div id="tray">
        <canvas id="t0" width="100" height="100"></canvas>
        <canvas id="t1" width="100" height="100"></canvas>
        <canvas id="t2" width="100" height="100"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const fxCanvas = document.getElementById('fx-canvas');
    const fxCtx = fxCanvas.getContext('2d');
    const trayCanvases = [document.getElementById('t0'), document.getElementById('t1'), document.getElementById('t2')];
    
    let grid = Array(8).fill().map(() => Array(8).fill(null));
    let trayShapes = [null, null, null];
    let score = 0, displayScore = 0;
    let user = localStorage.getItem('bb_username');
    let stars = [];

    // Rənglər
    const COLORS = {
        blue: {m:'#4da6ff', l:'#99ccff', d:'#0066cc'},
        red: {m:'#ff4d4d', l:'#ff9999', d:'#cc0000'},
        green: {m:'#66cc66', l:'#99ff99', d:'#009900'},
        yellow: {m:'#ffcc00', l:'#ffff66', d:'#b38f00'},
        purple: {m:'#a64dff', l:'#cc99ff', d:'#6600cc'},
        orange: {m:'#ff944d', l:'#ffc299', d:'#cc5200'}
    };

    const SHAPES = [
        {d:[[1,1],[1,1]], c:'green'},
        {d:[[1,1,1,1]], c:'blue'},
        {d:[[1,1,1]], c:'yellow'},
        {d:[[1,1,1],[0,1,0]], c:'purple'},
        {d:[[1,0],[1,0],[1,1]], c:'orange'},
        {d:[[1,1,0],[0,1,1]], c:'red'},
        {d:[[1]], c:'blue'}
    ];

    let drag = null;
    let mouse = {x:0, y:0};

    // Başlanğıc Yoxlaması
    window.onload = () => {
        fxCanvas.width = window.innerWidth;
        fxCanvas.height = window.innerHeight;
        if(!user) {
            document.getElementById('auth-screen').style.display = 'flex';
        } else {
            initGame();
        }
    };

    function saveUser() {
        const val = document.getElementById('userName').value.trim();
        if(val.length < 2) return;
        localStorage.setItem('bb_username', val);
        user = val;
        document.getElementById('auth-screen').style.display = 'none';
        initGame();
    }

    function initGame() {
        grid = Array(8).fill().map(() => Array(8).fill(null));
        score = 0; displayScore = 0;
        generateTray();
        updateLeaderboard();
        requestAnimationFrame(loop);
    }

    function generateTray() {
        for(let i=0; i<3; i++) trayShapes[i] = SHAPES[Math.floor(Math.random()*SHAPES.length)];
        checkGameOver();
    }

    // Uduzmaq Yoxlaması
    function checkGameOver() {
        let anyPossible = false;
        trayShapes.forEach(shape => {
            if(!shape) return;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(canPlace(r, c, shape.d)) anyPossible = true;
                }
            }
        });

        if(!anyPossible && trayShapes.some(s => s !== null)) {
            setTimeout(() => {
                document.getElementById('finalScore').innerText = score;
                document.getElementById('game-over').style.display = 'flex';
            }, 1000);
        }
    }

    function restartGame() {
        document.getElementById('game-over').style.display = 'none';
        initGame();
    }

    // Blok Çəkmə
    function drawBlock(c, x, y, size, clrKey, alpha = 1) {
        const clr = COLORS[clrKey];
        c.globalAlpha = alpha;
        c.fillStyle = clr.m;
        c.fillRect(x, y, size, size);
        c.fillStyle = clr.l;
        c.fillRect(x, y, size, 4); c.fillRect(x, y, 4, size);
        c.fillStyle = clr.d;
        c.fillRect(x, y+size-4, size, 4); c.fillRect(x+size-4, y, 4, size);
        c.globalAlpha = 1;
    }

    // Ulduz Yağışı Effekti
    function createStars() {
        for(let i=0; i<30; i++) {
            stars.push({
                x: window.innerWidth/2,
                y: window.innerHeight/2,
                vx: (Math.random()-0.5)*15,
                vy: (Math.random()-0.5)*15,
                size: Math.random()*5+2,
                life: 1
            });
        }
    }

    function loop() {
        ctx.clearRect(0,0,400,400);
        fxCtx.clearRect(0,0,fxCanvas.width, fxCanvas.height);

        // Xal Artımı
        if(displayScore < score) {
            displayScore += Math.ceil((score - displayScore)/10);
            document.getElementById('score-view').innerText = displayScore;
        }

        // Grid
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                ctx.fillStyle = "rgba(0,0,0,0.15)";
                ctx.fillRect(c*50+2, r*50+2, 46, 46);
                if(grid[r][c]) drawBlock(ctx, c*50, r*50, 50, grid[r][c]);
            }
        }

        // Tray
        trayCanvases.forEach((tc, i) => {
            const tctx = tc.getContext('2d');
            tctx.clearRect(0,0,100,100);
            if(trayShapes[i] && drag?.idx !== i) {
                const s = trayShapes[i];
                s.d.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) drawBlock(tctx, ci*20+20, ri*20+20, 18, s.c);
                }));
            }
        });

        // Drag
        if(drag) {
            const r = canvas.getBoundingClientRect();
            const gx = Math.floor((mouse.x - r.left)/50);
            const gy = Math.floor((mouse.y - r.top)/50);
            if(canPlace(gy, gx, drag.s.d)) {
                drag.s.d.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) drawBlock(ctx, (gx+ci)*50, (gy+ri)*50, 50, drag.s.c, 0.3);
                }));
            }
            drag.s.d.forEach((row, ri) => row.forEach((v, ci) => {
                if(v) drawBlock(ctx, (mouse.x - r.left) + ci*50 - 25, (mouse.y - r.top) + ri*50 - 25, 50, drag.s.c);
            }));
        }

        // Ulduzları hərəkət etdir
        stars.forEach((s, i) => {
            s.x += s.vx; s.y += s.vy; s.life -= 0.02;
            fxCtx.fillStyle = `rgba(255, 204, 0, ${s.life})`;
            fxCtx.beginPath();
            fxCtx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            fxCtx.fill();
            if(s.life <= 0) stars.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }

    function canPlace(r, c, d) {
        for(let ri=0; ri<d.length; ri++) for(let ci=0; ci<d[ri].length; ci++) {
            if(d[ri][ci]) {
                if(r+ri<0 || r+ri>=8 || c+ci<0 || c+ci>=8 || grid[r+ri][c+ci]) return false;
            }
        }
        return true;
    }

    function checkLines() {
        let rs = [], cs = [];
        for(let i=0; i<8; i++) {
            if(grid[i].every(x => x !== null)) rs.push(i);
            let f = true;
            for(let j=0; j<8; j++) if(!grid[j][i]) f = false;
            if(f) cs.push(i);
        }
        if(rs.length || cs.length) {
            rs.forEach(r => grid[r] = Array(8).fill(null));
            cs.forEach(c => { for(let i=0; i<8; i++) grid[i][c] = null; });
            score += (rs.length + cs.length) * 120;
            showCombo();
            createStars();
            saveScore();
        }
    }

    function showCombo() {
        const msgs = ["MOHTESEM!", "ELA!", "SUPER!", "AMAZING!"];
        const el = document.getElementById('combo-msg');
        el.innerText = msgs[Math.floor(Math.random()*msgs.length)];
        el.classList.add('active-msg');
        setTimeout(() => el.classList.remove('active-msg'), 800);
    }

    function saveScore() {
        localStorage.setItem('bb_score_' + user, score);
        updateLeaderboard();
    }

    function updateLeaderboard() {
        let p = [];
        for(let i=0; i<localStorage.length; i++) {
            let k = localStorage.key(i);
            if(k.startsWith('bb_score_')) p.push({n: k.replace('bb_score_',''), s: parseInt(localStorage.getItem(k))});
        }
        p.sort((a,b) => b.s - a.s);
        document.getElementById('rankRows').innerHTML = p.slice(0,10).map((x, i) => `
            <div class="lb-item"><span>${i+1}. ${x.n}</span><b>${x.s}</b></div>
        `).join('');
    }

    // Events
    const start = (ex, ey) => {
        trayCanvases.forEach((tc, i) => {
            const r = tc.getBoundingClientRect();
            if(ex>=r.left && ex<=r.right && ey>=r.top && ey<=r.bottom && trayShapes[i]) {
                drag = {idx: i, s: trayShapes[i]};
            }
        });
    };
    const end = () => {
        if(drag) {
            const r = canvas.getBoundingClientRect();
            const gx = Math.floor((mouse.x - r.left)/50);
            const gy = Math.floor((mouse.y - r.top)/50);
            if(canPlace(gy, gx, drag.s.d)) {
                drag.s.d.forEach((row, ri) => row.forEach((v, ci) => { if(v) grid[gy+ri][gx+ci] = drag.s.c; }));
                trayShapes[drag.idx] = null;
                checkLines();
                if(trayShapes.every(s => s === null)) generateTray();
                else checkGameOver();
                score += 10;
                saveScore();
            }
        }
        drag = null;
    };

    window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => {mouse.x = e.clientX; mouse.y = e.clientY;});
    window.addEventListener('mouseup', end);
    window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', e => {mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;});
    window.addEventListener('touchend', end);

</script>
</body>
</html>
