<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Blast Ultimate - Pro Edition</title>
    <style>
        :root {
            /* Şəkildəki rənglər */
            --bg-color: #3b4a8b; /* Şəkildəki tünd mavi arxa fon */
            --grid-bg: #2d396d;
            --panel-bg: rgba(23, 32, 70, 0.8);
            --accent: #ffcc00;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: row; /* Sıralama solda olsun deyə */
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Sol Sıralama Paneli */
        #side-panel {
            width: 250px;
            height: 80vh;
            background: var(--panel-bg);
            margin-right: 40px;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .leaderboard-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #rankList {
            flex-grow: 1;
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 1.1rem;
        }

        /* Oyun Sahəsi */
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .score-container {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 2px 4px 0px rgba(0,0,0,0.3);
        }

        #board-canvas {
            background: var(--grid-bg);
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #tray {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .tray-cell {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Giriş Modalı */
        #auth-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #2d396d;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 350px;
            border: 4px solid var(--accent);
        }

        input {
            width: 80%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            text-align: center;
        }

        .btn-start {
            background: var(--accent);
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="auth-modal">
    <div class="modal-content">
        <h1 style="margin:0; color:white">BLOCK BLAST</h1>
        <p>Adınızı daxil edin:</p>
        <input type="text" id="pNameInput" placeholder="Məs: Tural_92">
        <br>
        <button class="btn-start" onclick="initGame()">BAŞLA</button>
    </div>
</div>

<div id="side-panel">
    <div class="leaderboard-title">🏆 TOP 10</div>
    <div id="rankList"></div>
</div>

<div id="game-area">
    <div class="score-container" id="currentScore">0</div>
    <canvas id="board-canvas" width="400" height="400"></canvas>
    <div id="tray">
        <canvas id="t0" width="100" height="100"></canvas>
        <canvas id="t1" width="100" height="100"></canvas>
        <canvas id="t2" width="100" height="100"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('board-canvas');
    const ctx = canvas.getContext('2d');
    const trayCanvases = [document.getElementById('t0'), document.getElementById('t1'), document.getElementById('t2')];
    
    const GRID_SIZE = 8;
    const CELL_SIZE = 50;
    let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
    let trayShapes = [null, null, null];
    let score = 0;
    let user = "";

    // Blok rəngləri (Şəkildəki rənglər)
    const COLORS = {
        blue: { main: '#4da6ff', light: '#99ccff', dark: '#0066cc' },
        red: { main: '#ff4d4d', light: '#ff9999', dark: '#cc0000' },
        green: { main: '#66cc66', light: '#99ff99', dark: '#009900' },
        yellow: { main: '#ffcc00', light: '#ffff66', dark: '#b38f00' },
        purple: { main: '#a64dff', light: '#cc99ff', dark: '#6600cc' },
        orange: { main: '#ff944d', light: '#ffc299', dark: '#cc5200' }
    };

    const SHAPE_TYPES = [
        { data: [[1,1],[1,1]], color: 'green' },
        { data: [[1,1,1,1]], color: 'blue' },
        { data: [[1,1,1],[0,1,0]], color: 'purple' },
        { data: [[1,0],[1,0],[1,1]], color: 'orange' },
        { data: [[1,1,1]], color: 'yellow' },
        { data: [[1]], color: 'red' }
    ];

    let dragItem = null;
    let isDragging = false;
    let mousePos = { x: 0, y: 0 };

    function initGame() {
        const name = document.getElementById('pNameInput').value.trim();
        if(!name) return alert("Ad yazın!");
        user = name;
        document.getElementById('auth-modal').style.display = 'none';
        generateTray();
        updateLeaderboard();
        render();
    }

    // Blokun dizaynı (3D Bevel effekti)
    function drawBlock(ctx, x, y, size, colorKey, alpha = 1) {
        const c = COLORS[colorKey];
        ctx.globalAlpha = alpha;
        
        // Əsas bədən
        ctx.fillStyle = c.main;
        ctx.fillRect(x, y, size, size);

        // Üst işıq (Bevel)
        ctx.fillStyle = c.light;
        ctx.beginPath();
        ctx.moveTo(x, y); ctx.lineTo(x+size, y); ctx.lineTo(x+size-4, y+4); ctx.lineTo(x+4, y+4);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(x, y); ctx.lineTo(x, y+size); ctx.lineTo(x+4, y+size-4); ctx.lineTo(x+4, y+4);
        ctx.fill();

        // Alt kölgə
        ctx.fillStyle = c.dark;
        ctx.beginPath();
        ctx.moveTo(x+size, y+size); ctx.lineTo(x, y+size); ctx.lineTo(x+4, y+size-4); ctx.lineTo(x+size-4, y+size-4);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(x+size, y+size); ctx.lineTo(x+size, y); ctx.lineTo(x+size-4, y+4); ctx.lineTo(x+size-4, y+size-4);
        ctx.fill();
        
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.strokeRect(x, y, size, size);
        ctx.globalAlpha = 1;
    }

    function generateTray() {
        for(let i=0; i<3; i++) {
            trayShapes[i] = SHAPE_TYPES[Math.floor(Math.random()*SHAPE_TYPES.length)];
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Grid çək
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                ctx.fillStyle = "rgba(0,0,0,0.15)";
                ctx.fillRect(c*CELL_SIZE + 1, r*CELL_SIZE + 1, CELL_SIZE-2, CELL_SIZE-2);
                if(grid[r][c]) {
                    drawBlock(ctx, c*CELL_SIZE, r*CELL_SIZE, CELL_SIZE, grid[r][c]);
                }
            }
        }

        // Tray çək
        trayCanvases.forEach((tc, i) => {
            const tctx = tc.getContext('2d');
            tctx.clearRect(0,0,100,100);
            if(trayShapes[i] && dragItem?.idx !== i) {
                const shape = trayShapes[i];
                shape.data.forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) drawBlock(tctx, ci*20 + 20, ri*20 + 20, 18, shape.color);
                    });
                });
            }
        });

        // Sürüklənən blokun "Ghost" izi və özü
        if(isDragging && dragItem) {
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((mousePos.x - rect.left) / CELL_SIZE);
            const gy = Math.floor((mousePos.y - rect.top) / CELL_SIZE);

            if(canPlace(gy, gx, dragItem.shape.data)) {
                dragItem.shape.data.forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) drawBlock(ctx, (gx+ci)*CELL_SIZE, (gy+ri)*CELL_SIZE, CELL_SIZE, dragItem.shape.color, 0.4);
                    });
                });
            }

            // Real vaxtda blokun özü (mausun ucunda)
            dragItem.shape.data.forEach((row, ri) => {
                row.forEach((v, ci) => {
                    if(v) drawBlock(ctx, (mousePos.x - rect.left) + (ci*CELL_SIZE) - 25, 
                                     (mousePos.y - rect.top) + (ri*CELL_SIZE) - 25, 
                                     CELL_SIZE, dragItem.shape.color);
                });
            });
        }

        requestAnimationFrame(render);
    }

    // Məntiq funksiyaları
    function canPlace(r, c, data) {
        for(let ri=0; ri<data.length; ri++) {
            for(let ci=0; ci<data[ri].length; ci++) {
                if(data[ri][ci]) {
                    if(r+ri < 0 || r+ri >= 8 || c+ci < 0 || c+ci >= 8 || grid[r+ri][c+ci]) return false;
                }
            }
        }
        return true;
    }

    function checkMatches() {
        let toClearR = [], toClearC = [];
        for(let i=0; i<8; i++) {
            if(grid[i].every(x => x !== null)) toClearR.push(i);
            let colFull = true;
            for(let j=0; j<8; j++) if(!grid[j][i]) colFull = false;
            if(colFull) toClearC.push(i);
        }
        
        toClearR.forEach(r => grid[r] = Array(8).fill(null));
        toClearC.forEach(c => { for(let i=0; i<8; i++) grid[i][c] = null; });
        
        if(toClearR.length > 0 || toClearC.length > 0) {
            score += (toClearR.length + toClearC.length) * 100;
            document.getElementById('currentScore').innerText = score;
            saveScore();
        }
    }

    function saveScore() {
        localStorage.setItem('bb_score_' + user, score);
        updateLeaderboard();
    }

    function updateLeaderboard() {
        let players = [];
        for(let i=0; i<localStorage.length; i++){
            let k = localStorage.key(i);
            if(k.startsWith('bb_score_')) players.push({n: k.replace('bb_score_',''), s: parseInt(localStorage.getItem(k))});
        }
        players.sort((a,b) => b.s - a.s);
        document.getElementById('rankList').innerHTML = players.slice(0,10).map((p, i) => `
            <div class="rank-item"><span>${i+1}. ${p.n}</span><b>${p.s}</b></div>
        `).join('');
    }

    // Event Listeners
    window.addEventListener('mousedown', e => {
        trayCanvases.forEach((tc, i) => {
            const r = tc.getBoundingClientRect();
            if(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom && trayShapes[i]) {
                isDragging = true;
                dragItem = { idx: i, shape: trayShapes[i] };
            }
        });
    });

    window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });

    window.addEventListener('mouseup', () => {
        if(isDragging && dragItem) {
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((mousePos.x - rect.left) / CELL_SIZE);
            const gy = Math.floor((mousePos.y - rect.top) / CELL_SIZE);

            if(canPlace(gy, gx, dragItem.shape.data)) {
                dragItem.shape.data.forEach((row, ri) => {
                    row.forEach((v, ci) => { if(v) grid[gy+ri][gx+ci] = dragItem.shape.color; });
                });
                trayShapes[dragItem.idx] = null;
                checkMatches();
                if(trayShapes.every(s => s === null)) generateTray();
            }
        }
        isDragging = false;
        dragItem = null;
    });

    // Touch dəstəyi
    window.addEventListener('touchstart', e => {
        const t = e.touches[0];
        mousePos.x = t.clientX; mousePos.y = t.clientY;
        trayCanvases.forEach((tc, i) => {
            const r = tc.getBoundingClientRect();
            if(t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom && trayShapes[i]) {
                isDragging = true;
                dragItem = { idx: i, shape: trayShapes[i] };
            }
        });
    });
    window.addEventListener('touchmove', e => { 
        mousePos.x = e.touches[0].clientX; 
        mousePos.y = e.touches[0].clientY; 
    });
    window.addEventListener('touchend', () => window.dispatchEvent(new Event('mouseup')));

</script>
</body>
</html>
