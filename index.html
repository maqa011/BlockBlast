<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Blast Pro - Ultimate Edition</title>
    <style>
        :root {
            --bg-main: #3b4a8b;
            --grid-bg: #2d396d;
            --panel-bg: rgba(23, 32, 70, 0.9);
            --accent-yellow: #ffcc00;
            --white: #ffffff;
            --gold: #ffd700;
        }

        body {
            background: var(--bg-main);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Sol Sıralama Paneli */
        #side-leaderboard {
            position: absolute;
            left: 30px;
            width: 260px;
            height: 85vh;
            background: var(--panel-bg);
            border-radius: 25px;
            padding: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .lb-header {
            font-size: 1.6rem;
            text-align: center;
            color: var(--accent-yellow);
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .rank-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: 0.3s;
        }

        .rank-row:hover { background: rgba(255,255,255,0.1); }

        /* Oyun Mərkəzi */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        #score-board {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-family: 'Arial Black', sans-serif;
        }

        #game-canvas {
            background: var(--grid-bg);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            border: 5px solid #252f5a;
        }

        #block-tray {
            display: flex;
            gap: 25px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .tray-box {
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        /* Təbrik Yazısı Animasiyası */
        #combo-text {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-yellow);
            text-shadow: 0 0 20px rgba(255,204,0,0.8), 0 5px 0 #b38f00;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-combo {
            transform: translate(-50%, -50%) scale(1.2) !important;
            opacity: 1 !important;
        }

        /* Giriş Ekranı */
        #login-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #2d396d, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--panel-bg);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            border: 4px solid var(--accent-yellow);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        input {
            width: 250px;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            margin: 20px 0;
            text-align: center;
            outline: none;
        }

        .start-btn {
            background: var(--accent-yellow);
            color: #000;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .start-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent-yellow); }
    </style>
</head>
<body>

<div id="combo-text">AMAZING!</div>

<div id="login-screen">
    <div class="login-box">
        <h1 style="font-size: 3rem; margin: 0;">BLOCK BLAST</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">Adını daxil et və yarışa qoşul!</p>
        <input type="text" id="playerName" placeholder="Oyunçu adı...">
        <br>
        <button class="start-btn" onclick="startApp()">BAŞLA</button>
    </div>
</div>

<div id="side-leaderboard">
    <div class="lb-header">🏆 REKORDLAR</div>
    <div id="leaderList"></div>
</div>

<div id="game-wrapper">
    <div id="score-board">0</div>
    <canvas id="game-canvas" width="440" height="440"></canvas>
    <div id="block-tray">
        <canvas id="t0" class="tray-box" width="110" height="110"></canvas>
        <canvas id="t1" class="tray-box" width="110" height="110"></canvas>
        <canvas id="t2" class="tray-box" width="110" height="110"></canvas>
    </div>
</div>

<script>
    // Oyun Dəyişənləri
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const trayCanvases = [document.getElementById('t0'), document.getElementById('t1'), document.getElementById('t2')];
    const scoreEl = document.getElementById('score-board');
    const comboEl = document.getElementById('combo-text');

    const GRID = 8;
    const CELL = 55;
    let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
    let trayShapes = [null, null, null];
    let score = 0;
    let displayScore = 0; // Animasiyalı artım üçün
    let currentPlayer = "";

    // Blok Rəngləri (3D Görünüş üçün)
    const COLORS = {
        blue: { m: '#4da6ff', l: '#99ccff', d: '#0066cc' },
        red: { m: '#ff4d4d', l: '#ff9999', d: '#cc0000' },
        green: { m: '#66cc66', l: '#99ff99', d: '#009900' },
        yellow: { m: '#ffcc00', l: '#ffff66', d: '#b38f00' },
        purple: { m: '#a64dff', l: '#cc99ff', d: '#6600cc' },
        orange: { m: '#ff944d', l: '#ffc299', d: '#cc5200' }
    };

    const SHAPES = [
        { d: [[1,1],[1,1]], c: 'green' },
        { d: [[1,1,1,1]], c: 'blue' },
        { d: [[1,1,1],[0,1,0]], c: 'purple' },
        { d: [[1,0],[1,0],[1,1]], c: 'orange' },
        { d: [[1,1,1]], c: 'yellow' },
        { d: [[1,1,0],[0,1,1]], c: 'red' },
        { d: [[1]], c: 'blue' }
    ];

    let dragItem = null;
    let isDragging = false;
    let mouse = { x: 0, y: 0 };

    // Giriş Funksiyası
    function startApp() {
        const name = document.getElementById('playerName').value.trim();
        if(name.length < 2) return alert("Zəhmət olmasa düzgün ad daxil edin.");
        currentPlayer = name;
        document.getElementById('login-screen').style.display = 'none';
        
        // localStorage-dan xalı götür
        const saved = localStorage.getItem('bb_score_' + currentPlayer);
        if(saved) score = parseInt(saved);
        
        generateTray();
        updateLeaderboard();
        requestAnimationFrame(gameLoop);
    }

    // Blok Çəkmə (Professional 3D)
    function drawBlock(c, x, y, size, colorKey, alpha = 1) {
        const clr = COLORS[colorKey];
        c.globalAlpha = alpha;
        
        // Ana kvadrat
        c.fillStyle = clr.m;
        c.fillRect(x, y, size, size);

        // Parlaqlıq (Üst/Sol)
        c.fillStyle = clr.l;
        c.beginPath();
        c.moveTo(x,y); c.lineTo(x+size,y); c.lineTo(x+size-5,y+5); c.lineTo(x+5,y+5); c.fill();
        c.beginPath();
        c.moveTo(x,y); c.lineTo(x,y+size); c.lineTo(x+5,y+size-5); c.lineTo(x+5,y+5); c.fill();

        // Kölgə (Alt/Sağ)
        c.fillStyle = clr.d;
        c.beginPath();
        c.moveTo(x+size,y+size); c.lineTo(x,y+size); c.lineTo(x+5,y+size-5); c.lineTo(x+size-5,y+size-5); c.fill();
        c.beginPath();
        c.moveTo(x+size,y+size); c.lineTo(x+size,y); c.lineTo(x+size-5,y+5); c.lineTo(x+size-5,y+size-5); c.fill();
        
        c.strokeStyle = "rgba(0,0,0,0.15)";
        c.strokeRect(x,y,size,size);
        c.globalAlpha = 1;
    }

    function generateTray() {
        for(let i=0; i<3; i++) {
            trayShapes[i] = SHAPES[Math.floor(Math.random()*SHAPES.length)];
        }
    }

    // Təbrik Yazıları
    function showComboText() {
        const texts = ["AMAZING!", "MÖHTƏŞƏM!", "ƏLA!", "BRAVO!", "SÜPER!"];
        comboEl.innerText = texts[Math.floor(Math.random()*texts.length)];
        comboEl.classList.add('show-combo');
        setTimeout(() => comboEl.classList.remove('show-combo'), 1000);
    }

    // Əsas Render
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Xal animasiyası (Yavaş-yavaş artır)
        if(displayScore < score) {
            displayScore += Math.ceil((score - displayScore) / 10);
            scoreEl.innerText = displayScore;
        }

        // Grid Draw
        for(let r=0; r<GRID; r++) {
            for(let c=0; c<GRID; c++) {
                ctx.fillStyle = "rgba(0,0,0,0.18)";
                ctx.fillRect(c*CELL + 2, r*CELL + 2, CELL-4, CELL-4);
                if(board[r][c]) {
                    drawBlock(ctx, c*CELL, r*CELL, CELL, board[r][c]);
                }
            }
        }

        // Tray Draw
        trayCanvases.forEach((tc, i) => {
            const tctx = tc.getContext('2d');
            tctx.clearRect(0,0,110,110);
            if(trayShapes[i] && dragItem?.idx !== i) {
                const s = trayShapes[i];
                s.d.forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) drawBlock(tctx, ci*22+22, ri*22+22, 20, s.c);
                    });
                });
            }
        });

        // Dragging & Preview
        if(isDragging && dragItem) {
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((mouse.x - rect.left) / CELL);
            const gy = Math.floor((mouse.y - rect.top) / CELL);

            // Ghost Preview
            if(canPlace(gy, gx, dragItem.s.d)) {
                dragItem.s.d.forEach((row, ri) => {
                    row.forEach((v, ci) => {
                        if(v) drawBlock(ctx, (gx+ci)*CELL, (gy+ri)*CELL, CELL, dragItem.s.c, 0.4);
                    });
                });
            }

            // Real Dragging Block
            dragItem.s.d.forEach((row, ri) => {
                row.forEach((v, ci) => {
                    if(v) drawBlock(ctx, (mouse.x - rect.left) + (ci*CELL) - CELL/2, 
                                     (mouse.y - rect.top) + (ri*CELL) - CELL/2, 
                                     CELL, dragItem.s.c);
                });
            });
        }

        requestAnimationFrame(gameLoop);
    }

    // Məntiq
    function canPlace(r, c, data) {
        for(let ri=0; ri<data.length; ri++) {
            for(let ci=0; ci<data[ri].length; ci++) {
                if(data[ri][ci]) {
                    if(r+ri < 0 || r+ri >= GRID || c+ci < 0 || c+ci >= GRID || board[r+ri][c+ci]) return false;
                }
            }
        }
        return true;
    }

    function checkLines() {
        let rows = [], cols = [];
        for(let i=0; i<GRID; i++) {
            if(board[i].every(x => x !== null)) rows.push(i);
            let colFull = true;
            for(let j=0; j<GRID; j++) if(!board[j][i]) colFull = false;
            if(colFull) cols.push(i);
        }
        
        if(rows.length > 0 || cols.length > 0) {
            rows.forEach(r => board[r] = Array(GRID).fill(null));
            cols.forEach(c => { for(let i=0; i<GRID; i++) board[i][c] = null; });
            
            score += (rows.length + cols.length) * 150 + (Math.floor(Math.random()*50));
            showComboText();
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('bb_score_' + currentPlayer, score);
        updateLeaderboard();
    }

    function updateLeaderboard() {
        let players = [];
        for(let i=0; i<localStorage.length; i++) {
            let key = localStorage.key(i);
            if(key.startsWith('bb_score_')) {
                players.push({name: key.replace('bb_score_',''), score: parseInt(localStorage.getItem(key))});
            }
        }
        players.sort((a,b) => b.score - a.score);
        document.getElementById('leaderList').innerHTML = players.slice(0, 10).map((p, i) => `
            <div class="rank-row">
                <span>${i+1}. ${p.name}</span>
                <b style="color:#ffcc00">${p.score}</b>
            </div>
        `).join('');
    }

    // Mouse & Touch Events
    const handleStart = (ex, ey) => {
        trayCanvases.forEach((tc, i) => {
            const r = tc.getBoundingClientRect();
            if(ex >= r.left && ex <= r.right && ey >= r.top && ey <= r.bottom && trayShapes[i]) {
                isDragging = true;
                dragItem = { idx: i, s: trayShapes[i] };
            }
        });
    }

    const handleEnd = () => {
        if(isDragging && dragItem) {
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((mouse.x - rect.left) / CELL);
            const gy = Math.floor((mouse.y - rect.top) / CELL);

            if(canPlace(gy, gx, dragItem.s.d)) {
                dragItem.s.d.forEach((row, ri) => {
                    row.forEach((v, ci) => { if(v) board[gy+ri][gx+ci] = dragItem.s.c; });
                });
                trayShapes[dragItem.idx] = null;
                checkLines();
                if(trayShapes.every(s => s === null)) generateTray();
                score += 10; // Hər uğurlu yerləşdirmə üçün kiçik xal
                saveData();
            }
        }
        isDragging = false;
        dragItem = null;
    }

    window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseup', handleEnd);

    window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
    window.addEventListener('touchend', handleEnd);

</script>
</body>
</html>
